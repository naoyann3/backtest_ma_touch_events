name: Backtest MA Touch Events

on:
  workflow_dispatch:
    inputs:
      period:
        description: "yfinance history period (example: 5y, 7y)"
        required: false
        default: "5y"
      max_tickers:
        description: "Optional ticker limit (0 = all)"
        required: false
        default: "0"

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Set run date
        run: |
          echo "RUN_DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Run MA touch backtest
        run: |
          python backtest_ma_touch_events.py \
            --period "${{ github.event.inputs.period || '5y' }}" \
            --max-tickers "${{ github.event.inputs.max_tickers || '0' }}"

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-touch-backtest-results-${{ env.RUN_DATE }}
          path: |
            results/ma_touch_backtests/*.csv
