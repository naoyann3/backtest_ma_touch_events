name: Backtest MA Touch Events

on:
  workflow_dispatch:
    inputs:
      period:
        description: "yfinance history period (example: 5y, 7y)"
        required: false
        default: "5y"
      offset:
        description: "Start offset in tickers.csv (0-based)"
        required: false
        default: "0"
      limit:
        description: "How many tickers to process from offset"
        required: false
        default: "1000"
      tickers:
        description: "Optional comma-separated tickers to backtest (example: 4004.T,4062.T)"
        required: false
        default: ""

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Set run date
        run: |
          echo "RUN_DATE=$(date +%F)" >> $GITHUB_ENV
          echo "RUN_OFFSET=${{ github.event.inputs.offset || '0' }}" >> $GITHUB_ENV
          echo "RUN_LIMIT=${{ github.event.inputs.limit || '1000' }}" >> $GITHUB_ENV
          echo "RUN_TICKERS=${{ github.event.inputs.tickers || '' }}" >> $GITHUB_ENV

      - name: Run MA touch backtest
        run: |
          python backtest_ma_touch_events.py \
            --period "${{ github.event.inputs.period || '5y' }}" \
            --offset "${{ github.event.inputs.offset || '0' }}" \
            --limit "${{ github.event.inputs.limit || '1000' }}" \
            --tickers "${{ github.event.inputs.tickers || '' }}"

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-touch-backtest-results-${{ env.RUN_DATE }}-o${{ env.RUN_OFFSET }}-l${{ env.RUN_LIMIT }}${{ env.RUN_TICKERS != '' && '-custom' || '' }}
          path: |
            results/ma_touch_backtests/*.csv
